<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>
<h2>Register</h2>
<form id="registerForm">
    <input type="text" id="regName" placeholder="Name" required><br><br>
    <input type="email" id="regEmail" placeholder="Email" required><br><br>
    <input type="password" id="regPassword" placeholder="Password" required><br><br>

    <label id="captchaQuestion"></label>
    <input type="text" id="captchaAnswer" placeholder="Answer" required>
    <input type="hidden" id="captchaId"><br><br>

    <button type="submit">Register</button>
</form>

<br>
<button onclick="window.location.href='/login.html'">Login</button>

<script>
    function loadCaptcha() {
        fetch('/captcha')
            .then(res => res.json())
            .then(data => {
                document.getElementById('captchaQuestion').innerText = data.captchaQuestion;
                document.getElementById('captchaId').value = data.captchaId;
            });
    }
    window.onload = loadCaptcha;

    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const body = {
            name: document.getElementById('regName').value,
            email: document.getElementById('regEmail').value,
            password: document.getElementById('regPassword').value,
            captchaId: document.getElementById('captchaId').value,
            captchaAnswer: document.getElementById('captchaAnswer').value
        };
        fetch('/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) })
            .then(res => res.json())
            .then(data => {
                if(data.message) {
                    loadCaptcha();
                } else {
                    window.location.href = "/profile";
                }
            });
    });
</script>
</body>
</html>
