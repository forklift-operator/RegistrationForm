<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
</head>
<body>
<div id="profileSection" style="display: none;">
    <h3 id="errorMessage"></h3>
    <h2>Hello, <span id="welcomeName"></span>!</h2>
    <p>Email: <span id="welcomeEmail"></span></p>

    <h3>Update info</h3>
    <h4 id="errorMessageUpdate"></h4>
    <form id="updateForm">
        <input type="text" id="newName" placeholder="New name"><br><br>
        <input type="password" id="newPassword" placeholder="New password"><br><br>
        <button type="submit">Save</button>
    </form>

    <br><br>
    <button onclick="handleLogout()" style="background-color: red; color: white;">Logout</button>
</div>

<script>
    window.onload = function() {
        fetch('/me')
            .then(res => {
                if (res.status === 401) {
                    alert("Not logged in");
                    window.location.href = "/";
                    throw new Error("Unauthorized");
                }
                return res.json();
            })
            .then(user => {
                document.getElementById('profileSection').style.display = 'block';
                document.getElementById('welcomeName').innerText = user.name;
                document.getElementById('welcomeEmail').innerText = user.email;
            })
            .catch(err => {
                document.getElementById("errorMessage").textContent = err
                console.log("Session check failed.");
            });
    };

    document.getElementById('updateForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const body = {};
        const nameVal = document.getElementById('newName').value;
        const passVal = document.getElementById('newPassword').value;

        if(nameVal) body.name = nameVal;
        if(passVal) body.password = passVal;

        fetch('/update', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        })
            .then(res => res.json())
            .then(data => {
                if(data.message) {
                    console.error(data.message);
                    document.getElementById("errorMessageUpdate").textContent = data.message;
                }
                else {
                    location.reload();
                }
            });
    });

    function handleLogout() {
        fetch('/logout', { method: 'POST' })
            .then(() => {
                window.location.href = "/";
            });
    }
</script>
</body>
</html>
