<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
<h2>Login</h2>
<!--error message will be displayed here-->
<h3 id="errorMessage"></h3>
<form id="loginForm">
    <input type="email" id="loginEmail" placeholder="Email" required><br><br>
    <input type="password" id="loginPassword" placeholder="Password" required><br><br>
    <button type="submit">Login</button>
</form>

<br>
<button onclick="window.location.href='/register.html'">Register</button>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const body = {
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value
        };
        fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) })
            .then(res => res.json())
            .then(data => {
                if(data.message) {
                    document.getElementById('errorMessage').textContent = data.message;
                } else {
                    window.location.href = "/profile";
                }
            });
    });
</script>
</body>
</html>
