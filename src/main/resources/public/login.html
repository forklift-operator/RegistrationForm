<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
</head>
<body>
<h2>Вход в системата</h2>
<form id="loginForm">
    <input type="email" id="loginEmail" placeholder="Имейл" required><br><br>
    <input type="password" id="loginPassword" placeholder="Парола" required><br><br>
    <button type="submit">Влез</button>
</form>

<br>
<button onclick="window.location.href='/register.html'">Нямаш акаунт? Регистрирай се</button>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const body = {
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value
        };
        fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) })
            .then(res => res.json())
            .then(data => {
                if(data.message) alert(data.message);
                else {
                    alert("Успешен вход!");
                    window.location.href = "/profile";
                }
            });
    });
</script>
</body>
</html>
